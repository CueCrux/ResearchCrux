name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  schema-validation:
    name: Schema Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run validate:schemas

  verify-library:
    name: Verify Library
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
      - name: CLI smoke test
        run: npx tsx src/cli.ts ../proof-gallery/examples/receipt-light.json

  json-lint:
    name: JSON Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON files
        run: |
          failed=0
          for f in $(find proof-gallery -name '*.json' -o -name '*.schema.json'); do
            if ! python3 -c "import json; json.load(open('$f'))"; then
              echo "FAIL: $f"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo "::error::One or more JSON files are malformed"
            exit 1
          fi
          echo "All JSON files are valid"
